<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Mario JS</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <h1>🍄 Block Mario Game 🍄</h1>

  <div class="game-container">

    <div class="ui">
      <p>Score: <span id="score">0</span></p>
      <p>Levels: <span id="level">1</span></p>
      <p>Lives: <span id="lives">3</span></p>
    </div>

    <div id="game-area">
      <div id="mario"></div>
      <div id="coins-layer"></div>
      <div id="enemies-layer"></div>
    </div>

    <div class="controls">
      <p>Controls:</p>
      <p>Arrow Keys: Move Left/Right</p>
      <p>Down Arrow: Enter Pipe (when on top of it)</p>
    </div>
  </div>

  <div id="game-over">
    <h2 id="game-over-title">Game Over</h2>
    <p>Score: <span id="final-score">0</span></p>

    <div id="name-entry" style="display: none;">
      <p>TOP SCORE! ENTER YOUR NAME:</p>
      <input id="player-name" type="text" maxlength="3" placeholder="AAA" />
      <button id="submit-name">OK</button>
    </div>

    <div id="leaderboard">
      <h3>HIGH SCORES</h3>
      <ol id="leaderboard-list"></ol>
    </div>

    <button id="restart-button">Play Again</button>
  </div>


  <script type="module" src="js/main.js"></script>
</body>

</html>
